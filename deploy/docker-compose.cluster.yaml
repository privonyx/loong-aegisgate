services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  aegisgate-1:
    build:
      context: ..
      args:
        ENABLE_REDIS: "ON"
    ports:
      - "8081:8080"
    volumes:
      - ../config:/app/config:ro
      - data_1:/app/data
    environment:
      - AEGISGATE_DEPLOYMENT_MODE=cluster
      - AEGISGATE_REDIS_HOST=redis
      - AEGISGATE_REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  aegisgate-2:
    build:
      context: ..
      args:
        ENABLE_REDIS: "ON"
    ports:
      - "8082:8080"
    volumes:
      - ../config:/app/config:ro
      - data_2:/app/data
    environment:
      - AEGISGATE_DEPLOYMENT_MODE=cluster
      - AEGISGATE_REDIS_HOST=redis
      - AEGISGATE_REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      aegisgate-1:
        condition: service_healthy
      aegisgate-2:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  data_1:
  data_2:
  prometheus_data:
  grafana_data:

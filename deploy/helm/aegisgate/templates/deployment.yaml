apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegisgate.fullname" . }}
  labels:
    {{- include "aegisgate.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aegisgate.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "aegisgate.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aegisgate.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: aegisgate
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "/app/config/aegisgate.yaml"
          ports:
            - name: http
              containerPort: {{ .Values.config.serverPort }}
              protocol: TCP
          env:
            - name: AEGISGATE_PORT
              value: {{ .Values.config.serverPort | quote }}
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegisgate.fullname" . }}-credentials
                  key: postgres-url
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegisgate.fullname" . }}-credentials
                  key: redis-password
            - name: AEGISGATE_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegisgate.fullname" . }}-credentials
                  key: admin-key
            {{- range $i, $_ := .Values.auth.apiKeys }}
            - name: {{ if eq $i 0 }}AEGISGATE_API_KEY{{ else }}AEGISGATE_API_KEY_{{ $i }}{{ end }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegisgate.fullname" $ }}-credentials
                  key: api-key-{{ $i }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ .path }}
              port: http
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- with .Values.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ .path }}
              port: http
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config/aegisgate.yaml
              subPath: aegisgate.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/models.yaml
              subPath: models.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "aegisgate.fullname" . }}

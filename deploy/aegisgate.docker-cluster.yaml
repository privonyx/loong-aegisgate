# Docker Compose / multi-node profile: Redis + PostgreSQL via env (${POSTGRES_URL}, ${REDIS_PASSWORD}).
# Requires a build with -DENABLE_REDIS=ON / -DENABLE_PG=ON for full backend use; otherwise the gateway falls back to memory/sqlite.
server:
  host: "0.0.0.0"
  port: 8080
  threads: 0

edition: enterprise
license_file: ""

models_config: "config/models.yaml"

auth:
  enabled: true
  api_keys:
    - "${AEGISGATE_API_KEY}"
  admin_key: "${AEGISGATE_ADMIN_KEY}"

rbac:
  enabled: false

tls:
  enabled: false
  port: 0
  cert_path: ""
  key_path: ""

audit:
  log_path: "logs/audit.log"
  retention_days: 0

rate_limit:
  max_tokens: 10000.0
  refill_rate: 100.0

limits:
  max_request_body_size: 65536
  max_connections: 10000

features:
  routing:
    mode: basic
  guardrail:
    custom_rules: false
  management:
    mode: cli
  deployment:
    mode: cluster

storage:
  cache_backend: redis
  persistent_backend: postgres
  sqlite:
    path: "data/aegisgate.db"
    wal_mode: true
  redis:
    host: "redis"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0
    pool_size: 4
    connect_timeout_ms: 3000
    command_timeout_ms: 1000
  postgres:
    url: "${POSTGRES_URL}"
    pool_size: 4
    connect_timeout_ms: 5000

embedding:
  model_path: "models/bge-small-zh-v1.5.onnx"
  vocab_path: "models/vocab.txt"

cache:
  threshold: 0.95
  ttl_seconds: 3600
  max_entries: 10000
  max_partitions: 64
  context_aware: true
  warmup_file: ""

  adaptive_threshold:
    enabled: false
    min_threshold: 0.85
    max_threshold: 0.98
    adjustment_rate: 0.01
    window_size: 100

  policy:
    enabled: true
    skip_models: []
    max_temperature: 1.0
    skip_streaming: false

security:
  unicode_normalization: true
  encoding_detection: true
  encoding_min_base64_length: 20

  guard_model:
    enabled: false
    model_path: "models/safety-classifier.onnx"
    vocab_path: "models/vocab.txt"
    threshold: 0.5

  abuse_detection:
    enabled: true
    window_seconds: 300
    warn_threshold: 5
    throttle_threshold: 10
    block_threshold: 20
    block_duration_seconds: 1800

telemetry:
  enabled: false
  otlp_endpoint: "http://localhost:4318"
  service_name: "aegisgate"
  sample_ratio: 1.0

admin:
  jwt_secret: ""
  jwt_expire_seconds: 28800
  cors_origins: ["http://localhost:5173"]
  static_dir: "web/admin/dist"

logging:
  level: info
  file: ""

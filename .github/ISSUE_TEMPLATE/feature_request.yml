name: Feature Request
description: Suggest a new feature or enhancement for AegisGate
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe the problem you're trying to solve and the solution you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What pain point are you experiencing?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this feature affect?
      options:
        - Gateway (routing, connectors, load balancing)
        - Guardrails (injection, PII, topic, content filter)
        - Cache (semantic cache, vector index, embedder)
        - Observability (metrics, tracing, logging)
        - Authentication (API keys, RBAC, SSO)
        - Storage
        - Token Optimization
        - Server (HTTP, SSE streaming)
        - CLI (aegisctl)
        - SDK (Python / Node.js / Go)
        - Configuration
        - Deployment (Docker, Helm)
        - Documentation
        - New Component
    validations:
      required: true

  - type: dropdown
    id: edition
    attributes:
      label: Target Edition
      description: Which edition should this feature target?
      options:
        - Community (open source)
        - Enterprise (licensed)
        - Both
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, mockups, or references about the feature request.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help implement this feature?
      options:
        - label: I am willing to submit a pull request for this feature.

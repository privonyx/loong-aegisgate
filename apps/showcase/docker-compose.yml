# AegisGate Showcase App — 一键起后端 + 前端
#
# 前置：AegisGate 网关需已在 :8080 运行（仓库根 `docker compose up -d` 启动，
# 并在网关侧配置好各大模型 Provider Key）。本 compose 仅起 Demo 后端/前端，
# 后端经 AegisGate 调用真实大模型（real_only）。
#
# 用法：
#   1) cd <repo-root> && docker compose up -d        # 启动 AegisGate 网关
#   2) cp apps/showcase/.env.example apps/showcase/.env && 填入 AEGISGATE_API_KEY
#   3) cd apps/showcase && docker compose up --build  # 启动 Demo
#   访问 http://localhost:5173

services:
  showcase-backend:
    build: ./backend
    environment:
      - AEGISGATE_BASE_URL=${AEGISGATE_BASE_URL:-http://host.docker.internal:8080}
      - AEGISGATE_API_KEY=${AEGISGATE_API_KEY:?请在 apps/showcase/.env 设置 AEGISGATE_API_KEY}
      - SHOWCASE_MODEL=${SHOWCASE_MODEL:-gpt-4o-mini}
      - SHOWCASE_FALLBACK_MODEL=${SHOWCASE_FALLBACK_MODEL:-}
      - PORT=8090
      - SHOWCASE_CORS_ORIGIN=${SHOWCASE_CORS_ORIGIN:-*}
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  showcase-frontend:
    build: ./frontend
    environment:
      - SHOWCASE_BACKEND_URL=http://showcase-backend:8090
    ports:
      - "5173:5173"
    depends_on:
      - showcase-backend
    restart: unless-stopped

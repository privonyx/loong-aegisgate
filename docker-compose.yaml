services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegisgate
      POSTGRES_USER: aegisgate
      POSTGRES_PASSWORD: aegisgate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisgate -d aegisgate"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  aegisgate-1:
    # 容器化构建档位（TASK-20260618-01 P1-C / 与 scripts/build.sh 档位概念对齐）：
    # 默认精简档位（四 ARG 全 OFF）；生产档位用 .env 或 shell export 覆盖：
    #   ENABLE_REDIS=ON ENABLE_PG=ON ENABLE_OPENTELEMETRY=ON ENABLE_CONTROL_PLANE=ON \
    #   VCPKG_FEATURES="guard-spm;redis;pg;otel;control-plane" docker compose build
    build:
      context: .
      args:
        ENABLE_REDIS: ${ENABLE_REDIS:-OFF}
        ENABLE_PG: ${ENABLE_PG:-OFF}
        ENABLE_OPENTELEMETRY: ${ENABLE_OPENTELEMETRY:-OFF}
        ENABLE_CONTROL_PLANE: ${ENABLE_CONTROL_PLANE:-OFF}
        VCPKG_FEATURES: ${VCPKG_FEATURES:-}
    volumes:
      - ./config/models.yaml:/app/config/models.yaml:ro
      - ./deploy/aegisgate.docker-cluster.yaml:/app/config/aegisgate.yaml:ro
      - aegisgate_data_1:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - AEGISGATE_OTLP_ENDPOINT=http://tempo:4318
      - AEGISGATE_API_KEY=${AEGISGATE_API_KEY:-dev-gateway-key}
      - AEGISGATE_ADMIN_KEY=${AEGISGATE_ADMIN_KEY:-dev-admin-key}
      - POSTGRES_URL=postgres://aegisgate:aegisgate@postgres:5432/aegisgate
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  aegisgate-2:
    # 同 aegisgate-1 build args；两副本必须保持构建档位一致。
    build:
      context: .
      args:
        ENABLE_REDIS: ${ENABLE_REDIS:-OFF}
        ENABLE_PG: ${ENABLE_PG:-OFF}
        ENABLE_OPENTELEMETRY: ${ENABLE_OPENTELEMETRY:-OFF}
        ENABLE_CONTROL_PLANE: ${ENABLE_CONTROL_PLANE:-OFF}
        VCPKG_FEATURES: ${VCPKG_FEATURES:-}
    volumes:
      - ./config/models.yaml:/app/config/models.yaml:ro
      - ./deploy/aegisgate.docker-cluster.yaml:/app/config/aegisgate.yaml:ro
      - aegisgate_data_2:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - AEGISGATE_OTLP_ENDPOINT=http://tempo:4318
      - AEGISGATE_API_KEY=${AEGISGATE_API_KEY:-dev-gateway-key}
      - AEGISGATE_ADMIN_KEY=${AEGISGATE_ADMIN_KEY:-dev-admin-key}
      - POSTGRES_URL=postgres://aegisgate:aegisgate@postgres:5432/aegisgate
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - aegisgate-1
      - aegisgate-2
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./deploy/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "4318:4318"
      - "3200:3200"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      aegisgate-1:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  postgres_data:
  aegisgate_data_1:
  aegisgate_data_2:

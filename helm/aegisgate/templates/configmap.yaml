apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aegisgate.fullname" . }}-config
  labels:
    {{- include "aegisgate.labels" . | nindent 4 }}
data:
  aegisgate.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080
      threads: 0
    edition: {{ .Values.config.edition }}
    models_config: {{ .Values.config.models_config | quote }}
    deployment:
      mode: {{ .Values.deployment.mode }}
    storage:
      cache_backend: redis
      persistent_backend: sqlite
      redis:
        host: {{ .Values.redis.host | quote }}
        port: {{ .Values.redis.port }}
        db: {{ .Values.redis.db }}
    logging:
      level: {{ .Values.config.log_level }}
